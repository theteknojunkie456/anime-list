# Push a "what's new" notification to every subscriber when a release ships.
#
# Fires when index.html lands on main AND its RELEASE version changed since the
# previous commit — so ordinary edits don't notify anyone, only a real version
# bump does. Requires one repo secret: NOTIFY_ADMIN_TOKEN (must match the notify
# worker's ADMIN_TOKEN). Without it the job no-ops rather than failing loudly.
name: Announce release

on:
  push:
    branches: [main]
    paths: ["index.html"]

jobs:
  announce:
    runs-on: ubuntu-latest
    # Job-level env so the token is visible to step `if:` conditions. A step's own
    # `env:` is NOT in scope when its `if:` is evaluated — that was the bug: the
    # broadcast skipped even when the secret was set.
    env:
      NOTIFY_ADMIN_TOKEN: ${{ secrets.NOTIFY_ADMIN_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need the previous commit to compare RELEASE versions

      - name: Skip if RELEASE version is unchanged
        id: check
        run: |
          # Anchor to the RELEASE block — there are other v:'…' fields in the file.
          cur=$(grep -A3 'const RELEASE=' index.html | grep -m1 -oE "v:'[^']+'" || true)
          prev=$(git show HEAD~1:index.html 2>/dev/null | grep -A3 'const RELEASE=' | grep -m1 -oE "v:'[^']+'" || true)
          echo "current=$cur previous=$prev"
          if [ "$cur" = "$prev" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Broadcast
        if: steps.check.outputs.changed == 'true' && env.NOTIFY_ADMIN_TOKEN != ''
        run: node scripts/announce.mjs
