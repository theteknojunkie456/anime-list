# XcodeGen spec — generates WatchListParty.xcodeproj from the loose Swift files.
# Run:  xcodegen generate   (from this folder). Then open WatchListParty.xcodeproj.
#
# Two targets:
#   • WatchListParty  — the app you tap (SwiftUI): set a party code, Start Broadcast.
#   • BroadcastExt    — the ReplayKit Broadcast Upload Extension that captures the
#                       screen and sends it over WebRTC to your friends.
# No App Groups (those need a PAID account) — the app and extension share the party
# code through a private named pasteboard instead (see AppGroup.swift), so this signs
# and runs on a FREE Apple ID.
name: WatchListParty
options:
  bundleIdPrefix: com.humblezone.watchlist
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "150.0.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: "NO"
    CODE_SIGN_STYLE: Automatic
    # Put all app code in the main binary. Xcode's Debug "debug dylib" split
    # (the default) does NOT load when the app is installed outside Xcode (e.g.
    # via devicectl), so the app launches to a black screen. Keep this NO.
    ENABLE_DEBUG_DYLIB: "NO"
    # DEVELOPMENT_TEAM is intentionally left blank — pick your Apple ID team in
    # Xcode → target → Signing & Capabilities (do it for BOTH targets).

targets:
  WatchListParty:
    type: application
    platform: iOS
    sources:
      - WatchListBroadcastApp.swift
      - ContentView.swift
      - AppGroup.swift
      - Assets.xcassets
    info:
      path: Generated/App-Info.plist
      properties:
        CFBundleDisplayName: WatchList
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        NSFaceIDUsageDescription: Unlock WatchList with Face ID.
        NSPhotoLibraryUsageDescription: Choose a cover or background image for a title.
        NSCameraUsageDescription: Take a photo to use as a cover or background image.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.humblezone.watchlist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BroadcastExt

  BroadcastExt:
    type: app-extension
    platform: iOS
    sources:
      - SampleHandler.swift
      - PartySignaling.swift
      - WebRTCBroadcaster.swift
      - AppGroup.swift
    info:
      path: Generated/Ext-Info.plist
      properties:
        CFBundleDisplayName: WatchListBroadcast
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SampleHandler
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.humblezone.watchlist.BroadcastExt
    dependencies:
      - package: WebRTC
