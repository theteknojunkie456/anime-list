# WatchList — cloud sync + watch-party worker
#
# Deploy:  wrangler deploy -c sync-wrangler.toml
# Binds the existing "watchlist-sync" KV namespace as LISTS (used for both the
# per-code list sync and the party:<CODE> rooms). Same worker, same URL.

name = "watchlist-sync"
main = "sync-worker.js"
compatibility_date = "2025-06-01"
account_id = "dac431f2a81f703796b30b165e61b0f2"

[[kv_namespaces]]
binding = "LISTS"
id = "2d33c48c2507420f895ce4a26904ce0b"
