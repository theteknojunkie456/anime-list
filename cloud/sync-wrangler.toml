# WatchList — cloud sync + real-time watch-party worker
#
# Deploy:  wrangler deploy -c sync-wrangler.toml
#  • LISTS  = existing KV namespace (per-code list sync).
#  • PARTY  = Durable Object (one instance per room code) for the live watch
#    party over WebSockets. SQLite-backed DO → available on the free plan.

name = "watchlist-sync"
main = "sync-worker.js"
compatibility_date = "2025-06-01"
account_id = "dac431f2a81f703796b30b165e61b0f2"

[[kv_namespaces]]
binding = "LISTS"
id = "2d33c48c2507420f895ce4a26904ce0b"

[[durable_objects.bindings]]
name = "PARTY"
class_name = "PartyRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["PartyRoom"]
