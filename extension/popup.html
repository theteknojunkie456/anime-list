<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{color-scheme:dark}
  body{width:280px;margin:0;padding:16px;background:#0d0d0f;color:#f2f2f5;font:14px/1.4 system-ui,sans-serif}
  h1{font-size:15px;font-weight:800;margin:0 0 3px;display:flex;align-items:center;gap:7px}
  p.sub{margin:0 0 14px;font-size:12px;color:#9a9aa2}
  label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#8a8a92;margin:12px 0 5px}
  input{width:100%;box-sizing:border-box;height:40px;border-radius:10px;background:#1a1a1e;border:1px solid #2a2a30;color:#fff;padding:0 12px;font-size:14px}
  input#code{text-transform:uppercase;letter-spacing:.12em;font-weight:700}
  button{width:100%;height:44px;border:0;border-radius:11px;font:800 14px system-ui;margin-top:12px;cursor:pointer}
  .primary{background:#e0325b;color:#fff}
  .ghost{background:#1a1a1e;color:#fff;border:1px solid #2a2a30}
  .row{display:flex;gap:8px}
  .row button{margin-top:0}
  .status{margin-top:14px;padding:11px 13px;border-radius:11px;background:#161a17;border:1px solid #26332a;font-size:13px;display:none}
  .status.on{display:block}
  .code-big{font-size:22px;font-weight:900;letter-spacing:.16em;color:#ff6a8a;text-align:center;margin:2px 0}
  .hint{font-size:11px;color:#7a7a82;margin-top:12px;line-height:1.5}
</style>
</head>
<body>
  <h1>🎉 WatchList Party</h1>
  <p class="sub">Watch anime in perfect sync with friends on <b>AniNeko</b>.</p>

  <div id="setup">
    <label>Your name</label>
    <input id="name" placeholder="Alex" maxlength="24" autocomplete="off">
    <button class="primary" id="start">Start a party</button>
    <label>Or join a friend's</label>
    <div class="row">
      <input id="code" placeholder="CODE" maxlength="8" autocomplete="off">
      <button class="ghost" id="join" style="width:auto;padding:0 18px">Join</button>
    </div>
  </div>

  <div class="status" id="live">
    <div style="font-size:11px;color:#8a8a92;text-transform:uppercase;letter-spacing:.05em">In a party · share this code</div>
    <div class="code-big" id="liveCode">------</div>
    <button class="ghost" id="leave">Leave party</button>
  </div>

  <p class="hint">Open the same anime on <b>anineko.to</b> in each person's browser. Whoever the host is, their play / pause / seek controls everyone.</p>
  <script src="popup.js"></script>
</body>
</html>
